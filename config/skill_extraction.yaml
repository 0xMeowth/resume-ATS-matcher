academic_field_nouns:
  # Phrases ending in these are rejected unless matched by an entity ruler
  # (ESCO/MCF/Custom). Catches "Actuarial Sciences", "Life Sciences", etc.
  - sciences
  - studies
  - mathematics
  - statistics
  - arts
  - humanities

