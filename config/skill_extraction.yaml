# Note: some terms below also appear in light_head — intentional.
# light_head strips these from noun-chunk roots (keeping the modifier).
# exclude_list catches them if they surface as standalone candidates.
# These are different pipeline stages and the overlap is load-bearing.
exclude_list:

  # Generic / vague nouns
  - ability
  - area
  - background
  - competency
  #- discipline
  - domain
  - environment
  - experience
  - exposure
  - function
  - improvements
  - knowledge
  - minimum
  - preferred
  - prior
  - relevant
  - scope
  - skill
  - skills
  - working
  - year
  - years

  # Soft skills & traits
  - activities
  - adaptability
  - communication  # also in vague_outcome_nouns — intentional (different token-count targets)
  - curious
  - curiosity
  - driven
  - initiative
  - interpersonal
  - motivated
  - passionate
  - proactive
  - resourceful
  - responsible
  - self-motivated
  - self-starter
  - willingness

