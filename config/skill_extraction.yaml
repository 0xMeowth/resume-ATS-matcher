vague_outcome_nouns:
  - deployment
  - reliability
  - collaboration
  - communication  # also in exclude_list for single-token case; here catches multi-token phrases e.g. "stakeholder communication"
  - languages
  - performance
  - processes
  - work  # catches any "X work" phrase (full time work, hybrid work, etc.) — spaCy splits "full-time" so exclude_list exact match never fires

